apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ .Release.Name }}
  name: {{ .Release.Name }}
spec:
  ports:
  - port: {{ .Values.deployment.containerPort | default 8080 }}
    protocol: TCP
    targetPort: {{ .Values.deployment.containerPort | default 8080 }}
  selector:
    app: {{ .Release.Name }}