apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Release.Name }} 
    {{- include "builkdite-agent-metrics-helm.labels" . | nindent 4 }}
  name: {{ .Release.Name }} 
spec:
  replicas: {{ .Values.deployment.replicas }} 
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  strategy: {}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - image: "{{ .Values.deployment.image.repository }}:{{ .Values.deployment.image.tag }}"
        imagePullPolicy: {{ .Values.deployment.image.imagePullPolicy }}
        args: 
        {{- include "buildkite-agent-metrics.args" . | indent 8 -}}
        envFrom:
        {{- if .Values.deployment.token.existingSecret.enabled }}
        - secretRef:
            name: {{ .Values.deployment.token.existingSecret.name }}
        {{- end }}
        {{- with .Values.deployment.additionalEnvFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        {{- if not .Values.deployment.token.existingSecret.enabled }}
        - name: BUILDKITE_AGENT_TOKEN
          value: {{ .Values.deployment.token.value }}
        {{- end }}
        {{- with .Values.deployment.additionalEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        name: "buildkite-agent-metrics"
        ports:
          {{- if eq .Values.config.backend "prometheus" }}
        - containerPort: {{ .Values.config.prometheus.prometheusAddr | default ":8080" | splitList ":" | last }}
          {{- else if eq .Values.config.backend "cloudwatch"}}
        - containerPort: {{.Values.config.statsd.statsHost | default "127.0.0.1:8125" | splitList ":" | last }}
          {{- end }}
        resources: 
        {{- toYaml .Values.deployment.resources  | nindent 10 }}